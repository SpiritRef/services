<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多種雲圖案效果展示 | 鬼磕頭</title>
    <style>
        :root {
            /* 💡 沿用深灰藍與金色配色 */
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --bg-color: #2c3e50; /* 背景維持深色 */
            --text-color: #333;
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 💡 背景容器 */
        #cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        /* 💡 雲朵通用樣式 */
        .cloud-item {
            position: absolute;
            color: rgba(212, 175, 55, 0.3); /* 金色透明度 */
            fill: currentColor; /* 讓 SVG 繼承顏色 */
            user-select: none;
            filter: blur(1px); /* 輕微模糊增加神祕感 */
            animation: drift var(--duration) infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 💡 動畫：從左到右 */
        @keyframes drift {
            from { transform: translateX(-350px); }
            to { transform: translateX(calc(100vw + 350px)); }
        }

            background: rgba(255, 255, 255, 0.95);
