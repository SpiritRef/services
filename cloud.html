<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多種雲圖案效果展示 | 鬼磕頭</title>
    <style>
        :root {
            /* 💡 你的配色設定 */
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --bg-color: #f7f7f7; /* 回歸淺色底 */
            --text-color: #333;
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 💡 背景雲朵容器 */
        #cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        /* 💡 雲朵樣式：針對淺色底優化金色透明度 */
        .cloud-item {
            position: absolute;
            color: rgba(212, 175, 55, 0.25); /* 稍微調深一點點，確保在白底看得見 */
            fill: currentColor;
            user-select: none;
            filter: blur(1px);
            animation: drift var(--duration) infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes drift {
            from { transform: translateX(-350px); }
            to { transform: translateX(calc(100vw + 350px)); }
        }

        /* 💡 內容容器 */
        .container { 
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.95); 
            padding: 50px 30px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* 淺色底配輕微陰影 */
            text-align: center;
            backdrop-filter: blur(8px); /* 磨砂玻璃效果 */
            z-index: 1;
            box-sizing: border-box;
        }

        h1 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); display: inline-block; padding-bottom: 10px; margin-top: 0; }
        p { color: var(--text-color); font-size: 1.1rem; line-height: 1.8; }
        
        .preview-hint { margin-top: 30px; color: #999; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>

    <div id="cloud-container"></div>

    <div class="container">
        <h1>淺色底金雲效果</h1>
        <p>
            這是在 <b>#f7f7f7 淺灰色背景</b> 下的效果。<br>
            金色雲朵轉變為如同浮水印般的存在，<br>
            增加了頁面的層次感而不搶走文字的焦點。
        </p>
        <div class="preview-hint">背景雲朵包含四種形狀，隨機生成 25 朵雲。</div>
    </div>
