<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超自然現象彙典</title>
    <!-- 引入思源宋體以增加古典神秘感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 基礎樣式重置與設定 - 黑暗神秘風格 */
        body {
            font-family: 'Noto Serif TC', "PMingLiU", serif;
            background: radial-gradient(circle at center, #2b211e 0%, #0a0807 100%);
            background-attachment: fixed;
            color: #d4c4a8; /* 古銅/羊皮紙字體色 */
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* 列表主容器 - 金屬與暗色系面板 */
        .list-container {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(25, 20, 18, 0.85);
            padding: 40px;
            border: 2px solid #5c4a3d;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(139, 115, 85, 0.2);
            position: relative;
        }

        /* 標題與返回按鈕 */
        .back-home {
            display: inline-block;
            margin-bottom: 20px;
            color: #a68a61;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .back-home:hover {
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
        }
        h1 {
            text-align: center;
            color: #d4af37; /* 經典金色 */
            font-size: 2.5em;
            font-weight: 900;
            margin-top: 0;
            letter-spacing: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.3);
            border-bottom: 2px solid #5c4a3d;
            padding-bottom: 20px;
        }

        /* 控制列 (筆數、總計) */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #5c4a3d;
            color: #a68a61;
        }
        
        select {
            background: #1a1412;
            color: #d4c4a8;
            border: 1px solid #5c4a3d;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }
        select:focus {
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        /* 列表項目 - 羊皮紙質感卡片 */
        .notice-item {
            padding: 20px;
            margin-bottom: 20px;
            /* 模擬老舊紙張的漸層與底色 */
            background: linear-gradient(135deg, #e3d5b8 0%, #c8b48f 100%);
            border: 2px solid #3e2723;
            border-radius: 6px;
            color: #2b1a10;
            box-shadow: 3px 4px 10px rgba(0,0,0,0.6), inset 0 0 20px rgba(139, 69, 19, 0.1);
            position: relative;
        }
        /* 裝飾性內邊框 */
        .notice-item::before {
            content: "";
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(62, 39, 35, 0.3);
            pointer-events: none;
        }

        .faq-q {
            font-weight: 900;
            font-size: 1.25em;
            color: #4a0e0e; /* 暗紅色標題 */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .faq-a {
            color: #3e2723;
            font-weight: 600;
            padding-left: 35px;
        }
        .faq-a a {
            display: inline-block;
            margin-top: 10px;
            color: #7b1fa2; /* 神秘紫/暗紅 */
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .faq-a a:hover {
            border-bottom: 1px solid #7b1fa2;
        }

        /* 分頁區塊 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed #5c4a3d;
            color: #a68a61;
        }
        .page-btn {
            padding: 8px 20px;
            background: linear-gradient(to bottom, #4a3b32, #2b211e);
            color: #d4af37;
            border: 1px solid #7a6352;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
        }
        .page-btn:disabled {
            background: #1a1412;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
            box-shadow: none;
        }
        .page-btn:hover:not(:disabled) {
            background: linear-gradient(to bottom, #5c4a3d, #3e2723);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            border-color: #d4af37;
        }

        /* 浮動選單按鈕 - 魔法陣風格 */
        .expandable-menu-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }
        .floating-service-btn {
            background: radial-gradient(circle, #2b211e 0%, #110d0b 100%);
            color: #d4af37;
            border: 2px solid #8b7355;
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 10px rgba(212, 175, 55, 0.2);
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .floating-service-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.5);
            border-color: #d4af37;
        }
        
        /* 展開的選單內容 */
        .menu-content {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: rgba(20, 15, 12, 0.95);
            border: 1px solid #8b7355;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            padding: 15px 0;
            min-width: 180px;
        }
        .menu-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .menu-item {
            padding: 10px 20px;
            color: #d4c4a8;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
        }

        /* 頁首尾 */
        footer {
            text-align: center;
            margin-top: 50px;
            color: #5c4a3d;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 浮動選單區塊 -->
    <div class="expandable-menu-container" id="menuContainer">
        <div class="menu-content" id="menuContent">
            <div class="menu-item">🔮 最新目擊情報</div>
            <div class="menu-item">📜 靈異檔案歸檔</div>
            <div class="menu-item">👁️ 聯絡調查局</div>
        </div>
        <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
            <span id="serviceIcon">
                <!-- 修改為具備神秘感的芒星/幾何圖案 -->
                <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
            </span>
            <span id="serviceText">選單三</span>
        </button>
    </div>
    
    <!-- 主要內容區塊 -->
    <div class="list-container">
        <a href="../index.html" class="back-home">&#x2190;&#xFE0E; 返回首頁</a>
        <h1>超自然現象彙典</h1>

        <div class="controls">
            <div>每頁顯示：
                <select id="pageSize" onchange="changePageSize()">
                    <option value="5">5 條</option>
                    <option value="10" selected>10 條</option>
                    <option value="20">20 條</option>
                </select>
            </div>
            <div id="totalCount">共 0 筆</div>
        </div>

        <!-- 列表內容動態生成區 -->
        <div id="list-content">
            <!-- JavaScript 將會渲染內容至此 -->
        </div>

        <div class="pagination">
            <button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
            <span>跳至第 
                <select id="pageJump" class="jump-select" onchange="jumpToPage()">
                </select> 頁
            </span>
            <span id="pageInfo">第 1 頁</span>
            <button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 鬼磕頭. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript 邏輯 -->
    <script>
        // 1. 產生更具超自然氛圍的模擬資料庫
        const icons = ["🔮", "🎴", "👁️", "🕯️", "🌘"];
        const mockData = Array.from({ length: 32 }, (_, i) => {
            const icon = icons[i % icons.length];
            return {
                id: i + 1,
                q: `${icon} Q${i + 1}：午夜長廊的低語聲來源？`,
                a: `關於現象 ${i + 1} 的調查結果：經過靈能探測器掃描，發現異常的磁場波動。這份報告已由第三調查小組封存。`,
                linksHtml: `<a href="#" target="_blank" rel="noopener noreferrer">查看機密文件 ${i + 1} 🔏</a>`
            };
        });

        // 2. 分頁狀態變數
        let currentPage = 1;
        let pageSize = 10;
        let totalItems = mockData.length;

        // 3. 渲染列表的主要函式
        function renderList() {
            const listContent = document.getElementById('list-content');
            const totalCount = document.getElementById('totalCount');
            const pageInfo = document.getElementById('pageInfo');
            const pageJump = document.getElementById('pageJump');

            const totalPages = Math.ceil(totalItems / pageSize) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            totalCount.innerText = `共 ${totalItems} 筆`;
            pageInfo.innerText = `第 ${currentPage} 頁`;

            // 更新下拉跳頁選單
            pageJump.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.text = i;
                if (i === currentPage) option.selected = true;
                pageJump.appendChild(option);
            }

            // 計算當頁資料區間
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const currentData = mockData.slice(startIndex, endIndex);

            // 渲染 HTML 結構
            listContent.innerHTML = currentData.map(item => `
                <div class="notice-item">
                    <div class="faq-q">${item.q}</div>
                    <div class="faq-a">
                        <span>A: ${item.a}</span>
                        <br>
                        ${item.linksHtml}
                    </div>
                </div>
            `).join('');

            // 控制按鈕狀態
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
        }

        // 4. 事件觸發函式
        window.changePageSize = function() {
            pageSize = parseInt(document.getElementById('pageSize').value);
            currentPage = 1; 
            renderList();
        };

        window.prevPage = function() {
            if (currentPage > 1) {
                currentPage--;
                renderList();
            }
        };

        window.nextPage = function() {
            const totalPages = Math.ceil(totalItems / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderList();
            }
        };

        window.jumpToPage = function() {
            currentPage = parseInt(document.getElementById('pageJump').value);
            renderList();
        };

        window.toggleMenu = function() {
            const menu = document.getElementById('menuContent');
            menu.classList.toggle('active');
        };

        // 點擊空白處關閉選單
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('menuContent');
            const btn = document.getElementById('serviceBtn');
            if (!menu.contains(event.target) && !btn.contains(event.target)) {
                menu.classList.remove('active');
            }
        });

        // 5. 初始化畫面
        window.onload = function() {
            renderList();
        };
    </script>
</body>
</html>
