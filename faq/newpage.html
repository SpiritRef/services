<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超自然現象彙典</title>
    <!-- 引入思源宋體，保留檔案庫的正式與嚴謹感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 基礎樣式重置與設定 - 明亮乾淨背景 */
        body {
            font-family: 'Noto Serif TC', "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* 列表主容器 - 乾淨白底面板 */
        .list-container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #eaeaea;
            position: relative;
        }

        /* 標題與返回按鈕 */
        .back-home {
            display: inline-block;
            margin-bottom: 20px;
            color: #666666;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .back-home:hover {
            color: #111111;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            font-size: 2.2em;
            font-weight: 900;
            margin-top: 0;
            letter-spacing: 2px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        /* 控制列 (筆數、總計) */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #555555;
            font-weight: bold;
        }
        
        select {
            background: #ffffff;
            color: #333333;
            border: 1px solid #cccccc;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus {
            border-color: #8b7355;
            box-shadow: 0 0 0 2px rgba(139, 115, 85, 0.2);
        }

        /* 列表項目 - 牛皮紙質感卡片 */
        .notice-item {
            padding: 20px;
            margin-bottom: 20px;
            /* 模擬牛皮紙的漸層底色 */
            background: linear-gradient(135deg, #f7ebd7 0%, #e6d3af 100%);
            border: 1px solid #dcbfa2;
            border-left: 5px solid #8b7355; /* 古典褐木色點綴 */
            border-radius: 8px;
            color: #3e2723; /* 深棕色文字 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: box-shadow 0.3s, transform 0.3s;
            position: relative;
        }
        .notice-item:hover {
            box-shadow: 0 6px 16px rgba(139, 115, 85, 0.15);
            transform: translateY(-2px);
        }

        /* 問題區塊 */
        .faq-q {
            font-weight: 900;
            font-size: 1.15em;
            color: #4a2e1b; /* 較深的褐色以凸顯標題 */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 解答區塊 */
        .faq-a {
            color: #5c4332;
            padding-left: 35px;
            font-weight: 600;
        }
        .faq-a a {
            display: inline-block;
            margin-top: 10px;
            color: #8b3a3a; /* 暗紅色超連結，帶有復古批註感 */
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .faq-a a:hover {
            border-bottom: 1px solid #8b3a3a;
        }

        /* 分頁區塊 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            color: #555555;
            font-weight: bold;
        }
        .page-btn {
            padding: 8px 20px;
            background: #ffffff;
            color: #333333;
            border: 1px solid #cccccc;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
        }
        .page-btn:disabled {
            background: #f9f9f9;
            color: #aaaaaa;
            border-color: #eeeeee;
            cursor: not-allowed;
        }
        .page-btn:hover:not(:disabled) {
            background: #faf6f0;
            border-color: #8b7355;
            color: #8b7355;
        }

        /* 浮動選單按鈕 - 現代簡約風格 */
        .expandable-menu-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }
        .floating-service-btn {
            background: #ffffff;
            color: #333333;
            border: 1px solid #eaeaea;
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .floating-service-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        /* 展開的選單內容 */
        .menu-content {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 10px 0;
            min-width: 180px;
        }
        .menu-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .menu-item {
            padding: 12px 20px;
            color: #555555;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item:hover {
            background: #faf6f0;
            color: #8b7355;
        }

        /* 頁首尾 */
        footer {
            text-align: center;
            margin-top: 50px;
            color: #999999;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 浮動選單區塊 -->
    <div class="expandable-menu-container" id="menuContainer">
        <div class="menu-content" id="menuContent">
            <div class="menu-item">🔮 最新目擊情報</div>
            <div class="menu-item">📂 靈異檔案歸檔</div>
            <div class="menu-item">📞 聯絡調查局</div>
        </div>
        <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
            <span id="serviceIcon">
                <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#8b7355" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </span>
            <span id="serviceText">選單</span>
        </button>
    </div>
    
    <!-- 主要內容區塊 -->
    <div class="list-container">
        <a href="../index.html" class="back-home">&#x2190;&#xFE0E; 返回首頁</a>
        <h1>超自然現象彙典</h1>

        <div class="controls">
            <div>每頁顯示：
                <select id="pageSize" onchange="changePageSize()">
                    <option value="5">5 條</option>
                    <option value="10" selected>10 條</option>
                    <option value="20">20 條</option>
                </select>
            </div>
            <div id="totalCount">共 0 筆</div>
        </div>

        <!-- 列表內容動態生成區 -->
        <div id="list-content">
            <!-- JavaScript 將會渲染內容至此 -->
        </div>

        <div class="pagination">
            <button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
            <span>跳至第 
                <select id="pageJump" class="jump-select" onchange="jumpToPage()">
                </select> 頁
            </span>
            <span id="pageInfo">第 1 頁</span>
            <button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 鬼磕頭. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript 邏輯 -->
    <script>
        // 1. 產生模擬資料庫
        const icons = ["🔮", "📁", "👁️", "📝", "🔍"];
        const mockData = Array.from({ length: 32 }, (_, i) => {
            const icon = icons[i % icons.length];
            return {
                id: i + 1,
                q: `${icon} Q${i + 1}：午夜長廊的低語聲來源？`,
                a: `關於現象 ${i + 1} 的調查結果：經過儀器檢測與現場勘驗，已將相關數值記錄在案。該檔案目前處於歸檔狀態。`,
                linksHtml: `<a href="#" target="_blank" rel="noopener noreferrer">查看調查文件 ${i + 1} &#x2197;</a>`
            };
        });

        // 2. 分頁狀態變數
        let currentPage = 1;
        let pageSize = 10;
        let totalItems = mockData.length;

        // 3. 渲染列表的主要函式
        function renderList() {
            const listContent = document.getElementById('list-content');
            const totalCount = document.getElementById('totalCount');
            const pageInfo = document.getElementById('pageInfo');
            const pageJump = document.getElementById('pageJump');

            const totalPages = Math.ceil(totalItems / pageSize) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            totalCount.innerText = `共 ${totalItems} 筆`;
            pageInfo.innerText = `第 ${currentPage} / ${totalPages} 頁`;

            // 更新下拉跳頁選單
            pageJump.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.text = i;
                if (i === currentPage) option.selected = true;
                pageJump.appendChild(option);
            }

            // 計算當頁資料區間
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const currentData = mockData.slice(startIndex, endIndex);

            // 渲染 HTML 結構
            listContent.innerHTML = currentData.map(item => `
                <div class="notice-item">
                    <div class="faq-q">${item.q}</div>
                    <div class="faq-a">
                        <span>A: ${item.a}</span>
                        <br>
                        ${item.linksHtml}
                    </div>
                </div>
            `).join('');

            // 控制按鈕狀態
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
        }

        // 4. 事件觸發函式
        window.changePageSize = function() {
            pageSize = parseInt(document.getElementById('pageSize').value);
            currentPage = 1; 
            renderList();
        };

        window.prevPage = function() {
            if (currentPage > 1) {
                currentPage--;
                renderList();
            }
        };

        window.nextPage = function() {
            const totalPages = Math.ceil(totalItems / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderList();
            }
        };

        window.jumpToPage = function() {
            currentPage = parseInt(document.getElementById('pageJump').value);
            renderList();
        };

        window.toggleMenu = function() {
            const menu = document.getElementById('menuContent');
            menu.classList.toggle('active');
        };

        // 點擊空白處關閉選單
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('menuContent');
            const btn = document.getElementById('serviceBtn');
            if (!menu.contains(event.target) && !btn.contains(event.target)) {
                menu.classList.remove('active');
            }
        });

        // 5. 初始化畫面
        window.onload = function() {
            renderList();
        };
    </script>
</body>
</html>
