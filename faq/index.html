<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>常見問題 | 鬼磕頭</title>
    <meta name="description" content="查看鬼磕頭日誌的最新公告、服務更新與靈異紀實紀錄。">

    <link rel="icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://spiritref.github.io/ghoststory/pic/GhostKowtow.jpg">

    <meta property="og:title" content="常見問題 | 鬼磕頭">
    <meta property="og:description" content="查看鬼磕頭日誌的常見問題與說明。">
    <meta property="og:image" content="https://spiritref.github.io/ghoststory/pic/GhostKowtow.jpg">
    <meta property="og:type" content="website">

    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; color: #333; line-height: 1.6; }
        .list-container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { border-bottom: 2px solid #c0392b; padding-bottom: 10px; font-size: 1.5rem; color: #333; }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            background: #f9f9f9; 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 0.9rem;
            flex-wrap: wrap; 
            gap: 10px;
        }
        
        /* --- FAQ 摺疊項目樣式 (對齊公告風格) --- */
        .item { 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        .item:hover { background-color: #fffaf9; }
        .item:last-child { border-bottom: none; }

        .faq-header {
            padding: 18px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
        }
        
        .item.active .faq-header { color: #c0392b; }

        .toggle-icon {
            color: #c0392b;
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }
        .item.active .toggle-icon { transform: rotate(180deg); }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            color: #555;
            white-space: pre-line;
            word-wrap: break-word;
            font-size: 0.95rem;
            padding: 0 5px;
        }

        .item.active .faq-answer {
            max-height: 2000px;
            transition: max-height 0.4s ease-in;
            padding-bottom: 20px;
        }

        .date { color: #c0392b; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; display: block; }
        /* ------------------------------------- */

        .pagination { margin-top: 20px; display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .page-btn { padding: 6px 14px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-home { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #666; font-size: 0.9rem; }
        .jump-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; background: #fff; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .list-container { padding: 15px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="expandable-menu-container" id="menuContainer">
    <div class="menu-content" id="menuContent"></div>
    <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
        <span id="serviceIcon">☰</span>
        <span id="serviceText">選單</span>
    </button>
</div>
    
<div class="list-container">
    <a href="../index.html" class="back-home">⬅ 返回首頁</a>
    <h1>所有常見問題</h1>

    <div class="controls">
        <div>每頁顯示：
            <select id="pageSize" onchange="changePageSize()">
                <option value="10">10 條</option>
                <option value="20">20 條</option>
                <option value="50">50 條</option>
            </select>
        </div>
        <div id="totalCount">共 0 筆</div>
    </div>

    <div id="list-content">載入中...</div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
        <span>跳至第 
            <select id="pageJump" class="jump-select" onchange="jumpToPage()">
                <option value="1">1</option>
            </select> 頁
        </span>
        <span id="pageInfo">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
    </div>
</div>

<script type="module">
    import { getIni } from '../Javascript/API.js';
    import * as Global from 'https://spiritref.github.io/Javascript/global.js';

    let API_BASE = "";
    let JSON_PATH = ""; 
    let allData = [];
    let currentPage = 1;
    let pageSize = 10;
    const iniPath = '../settings/Services.ini';

    // 點擊摺疊切換
    window.toggleFaq = (element) => {
        element.classList.toggle('active');
    };

    async function init() {
        // 先讀取快取
        const cache = localStorage.getItem('cache_faq');
        if (cache) {
            allData = JSON.parse(cache);
            updateUI();
        }

        try {
            const config = await getIni(iniPath);
            if (config) {
                // 初始化選單
                if (config.MENU_DATA) Global.initMenu(config.MENU_DATA);
                
                JSON_PATH = config.JsonNotice || config.JsonData; 
                
                if (allData.length === 0 && JSON_PATH) await fetchStaticJson();

                if (config.NOVEL_API_URL) {
                    API_BASE = config.NOVEL_API_URL.startsWith("http") ? config.NOVEL_API_URL : atob(config.NOVEL_API_URL);
                    fetchRemoteData(cache); 
                }
            }
        } catch (e) { console.error("初始化失敗", e); }
    }

    async function fetchStaticJson() {
        try {
            let finalPath = JSON_PATH;
            if (window.location.pathname.includes('/article/') || window.location.pathname.includes('/ghoststory/')) {
                finalPath = JSON_PATH.startsWith('../') ? JSON_PATH : '../' + JSON_PATH;
            }
            const res = await fetch(finalPath);
            if (res.ok) {
                const data = await res.json();
                // 這裡過濾「常見問題」相關的資料，若無過濾需求則全顯
                allData = data.sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));
                updateUI();
            }
        } catch (e) { console.warn("無法讀取 JSON:", e); }
    }

    async function fetchRemoteData(cache) {
        try {
            const res = await fetch(`${API_BASE}${API_BASE.includes('?') ? '&' : '?'}type=faq`); // 假設 type 為 faq
            const data = await res.json();
            const sorted = data.sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));

            if (JSON.stringify(sorted) !== cache) {
                allData = sorted;
                updateUI();
                localStorage.setItem('cache_faq', JSON.stringify(sorted));
            }
        } catch(e) { console.error("API 同步失敗", e); }
    }

    function updateUI() {
        document.getElementById('totalCount').innerText = `共 ${allData.length} 筆`;
        updateJumpSelect();
        render();
    }

    function updateJumpSelect() {
        const select = document.getElementById('pageJump');
        const maxPage = Math.ceil(allData.length / pageSize) || 1;
        let options = "";
        for (let i = 1; i <= maxPage; i++) {
            options += `<option value="${i}" ${i === currentPage ? 'selected' : ''}>${i}</option>`;
        }
        select.innerHTML = options;
    }

    function render() {
        if (allData.length === 0) return;
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pagedData = allData.slice(start, end);

        document.getElementById('list-content').innerHTML = pagedData.map(i => {
            const dateStr = i["發佈日期"] ? new Date(i["發佈日期"]).toLocaleDateString() : "近期";
            return `
                <div class="item" onclick="toggleFaq(this)">
                    <div class="faq-header">
                        <span>${i["標題"] || "常見問題項目"}</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="faq-answer">
                        <span class="date">[更新日期：${dateStr}]</span>
                        <div class="content">${i["貼文內容"] || i["內容"]}</div>
                    </div>
                </div>
            `;
        }).join('');

        const maxPage = Math.ceil(allData.length / pageSize) || 1;
        document.getElementById('pageInfo').innerText = ` / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = end >= allData.length;
        document.getElementById('pageJump').value = currentPage;
    }

    window.changePageSize = () => {
        pageSize = parseInt(document.getElementById('pageSize').value);
        currentPage = 1;
        updateUI();
    };

    window.jumpToPage = () => {
        currentPage = parseInt(document.getElementById('pageJump').value);
        render();
        window.scrollTo(0, 0);
    };

    window.prevPage = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); } };
    window.nextPage = () => { if(currentPage * pageSize < allData.length) { currentPage++; render(); window.scrollTo(0,0); } };

    window.addEventListener('DOMContentLoaded', init);
</script>

<script type="module" src="https://spiritref.github.io/Javascript/global.js"></script>

</body>
</html>
