<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>常見問題 | 鬼磕頭</title>
    <meta name="description" content="針對靈學服務、驅鬼儀式及常見疑問的專業解答。">

    <link rel="icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://spiritref.github.io/GhostKowtow.jpg">

    <link rel="stylesheet" href="https://spiritref.github.io/CSS/global.css">
    <link rel="stylesheet" href="../CSS/Services.css">

    <meta property="og:title" content="常見問題 | 鬼磕頭">
    <meta property="og:description" content="針對靈學服務、驅鬼儀式及常見疑問的專業解答。">
    <meta property="og:image" content="https://spiritref.github.io/GhostKowtow.jpg">
    <meta property="og:url" content="https://spiritref.github.io/services/faq/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="鬼磕頭">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="常見問題 | 鬼磕頭">
    <meta name="twitter:description" content="專業靈學服務與常見疑問解答">
    <meta name="twitter:image" content="https://spiritref.github.io/GhostKowtow.jpg">

    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; color: #333; line-height: 1.6; }
        .list-container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { border-bottom: 2px solid #c0392b; padding-bottom: 10px; font-size: 1.5rem; color: #333; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 0.9rem; }

        /* 樣式對齊首頁 Q&A */
        .notice-item { display: block; margin-bottom: 25px; border-bottom: 1px dotted #eee; padding-bottom: 15px; }
        .notice-item:last-child { border-bottom: none; }

        .faq-q { font-weight: bold; color: #c0392b; margin-bottom: 8px; font-size: 1.1rem; }
        .faq-a { margin-left: 15px; font-size: 0.95em; line-height: 1.8; color: #444; white-space: pre-line; }
        .date-label { display: block; color: #999; font-size: 0.8rem; margin-bottom: 5px; }

        .pagination { margin-top: 20px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        .page-btn { padding: 6px 14px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .list-container { padding: 15px; }
            .faq-a { margin-left: 5px; }
        }
    </style>
</head>
<body>

<div class="expandable-menu-container" id="menuContainer">
    <div class="menu-content" id="menuContent"></div>
    <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
        <span id="serviceIcon">☰</span>
        <span id="serviceText">選單</span>
    </button>
</div>
    
<div class="list-container">
    <a href="../index.html" class="back-home">⬅ 返回首頁</a>
    <h1>所有常見問題</h1>

    <div class="controls">
        <div id="totalCount">共 0 筆</div>
    </div>

    <div id="list-content">載入中...</div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
        <span id="pageInfo">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
    </div>
</div>

<script type="module">
    import { getIni } from '../Javascript/API.js';
    import * as Global from 'https://spiritref.github.io/Javascript/global.js';

    let allFAQs = [];
    let currentPage = 1;
    let pageSize = 10;
    const iniPath = 'https://spiritref.github.io/settings/global.ini';

    async function init() {
        try {
            const config = await getIni(iniPath);
            if (config) {
                if (config.MENU_DATA) Global.initMenu(config.MENU_DATA);
                // 讀取數據源 (修正路徑)
                await fetchStaticJson("../../Data/Notices.json");
            }
        } catch (e) { console.error("初始化失敗", e); }
    }

    async function fetchStaticJson(path) {
        try {
            const res = await fetch(path);
            if (res.ok) {
                const data = await res.json();
                processData(data);
            }
        } catch (e) { console.warn("讀取失敗:", e); }
    }

    function processData(data) {
        // 【核心修正】只顯示常見問題，排除所有帶有【】文章與公告
        allFAQs = data.filter(item => {
            const title = item["標題"] || "";
            return !title.includes("【") && !title.includes("】") && !title.includes("公告");
        }).sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));

        updateUI();
    }

    function updateUI() {
        document.getElementById('totalCount').innerText = `共 ${allFAQs.length} 筆`;
        render();
    }

    function render() {
        const listContent = document.getElementById('list-content');
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pagedData = allFAQs.slice(start, end);

        if (pagedData.length === 0) {
            listContent.innerHTML = "目前暫無符合條件的常見問題項目。";
            return;
        }

        listContent.innerHTML = pagedData.map(item => {
            const q = item["標題"] || "常見問題";
            const a = item["貼文內容"] || item["內容"] || "暫無解答";
            const date = item["發佈日期"] ? new Date(item["發佈日期"]).toLocaleDateString() : "";

            return `
                <div class="notice-item">
                    <span class="date-label">[更新日期：${date}]</span>
                    <div class="faq-q">Q: ${q}</div>
                    <div class="faq-a">A: ${a}</div>
                </div>
            `;
        }).join('');

        const maxPage = Math.ceil(allFAQs.length / pageSize) || 1;
        document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = end >= allFAQs.length;
    }

    window.prevPage = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); } };
    window.nextPage = () => { if(currentPage * pageSize < allFAQs.length) { currentPage++; render(); window.scrollTo(0,0); } };

    window.addEventListener('DOMContentLoaded', init);
</script>

<script type="module" src="https://spiritref.github.io/Javascript/global.js"></script>

</body>
</html>
