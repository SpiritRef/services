<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>超自然現象彙典 | 鬼磕頭</title>
    <meta name="description" content="針對靈學服務、驅鬼儀式及常見疑問的專業解答。">

    <link rel="icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://spiritref.github.io/GhostKowtow.jpg">

    <link rel="stylesheet" href="https://spiritref.github.io/CSS/global.css">
    <link rel="stylesheet" href="../CSS/Services.css">

    <meta property="og:title" content="超自然現象彙典 | 鬼磕頭">
    <meta property="og:description" content="針對靈學服務、驅鬼儀式及常見疑問的專業解答。">
    <meta property="og:image" content="https://spiritref.github.io/GhostKowtow.jpg">
    <meta property="og:url" content="https://spiritref.github.io/services/faq/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="鬼磕頭">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="超自然現象彙典 | 鬼磕頭">
    <meta name="twitter:description" content="專業靈學服務與常見疑問解答">
    <meta name="twitter:image" content="https://spiritref.github.io/GhostKowtow.jpg">

    <style>
        :root {
            --primary-color: #c0392b;
            --primary-light: #fbecec;
            --bg-color: #f3f4f6;
            --text-main: #374151;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            padding: 30px 15px; 
            color: var(--text-main); 
            line-height: 1.7; 
            margin: 0;
        }
        
        .list-container { 
            max-width: 800px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        /* 標題與返回首頁 */
        .header-section {
            margin-bottom: 25px;
        }
        .back-home {
            display: inline-block;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
            transition: color 0.3s, transform 0.3s;
        }
        .back-home:hover {
            color: var(--primary-color);
            transform: translateX(-3px);
        }
        h1 { 
            margin: 0;
            font-size: 1.8rem; 
            color: #1f2937; 
            position: relative;
            padding-bottom: 12px;
        }
        h1::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        
        /* 控制列 */
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            background: #f8fafc; 
            padding: 12px 18px; 
            border-radius: 8px; 
            font-size: 0.95rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            flex-wrap: wrap; 
            gap: 15px;
        }

        select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus {
            border-color: var(--primary-color);
        }

        /* 卡片設計：Q&A 區塊 */
        #list-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .notice-item { 
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .notice-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            border-color: #d1d5db;
        }

        /* 題目 (Q) */
        .faq-q { 
            font-weight: 700; 
            color: var(--primary-color); 
            margin-bottom: 12px; 
            font-size: 1.3rem; 
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
        }

        /* 解答 (A) */
        .faq-a { 
            font-size: 1.1rem; 
            line-height: 1.7; /* 原本 0.8 太擠，調整為 1.7 提升閱讀體驗 */
            color: #4b5563; 
            white-space: pre-wrap; /* 讓 \t 和換行生效 */
            background: #fdfdfd;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--border-color);
        }
        
        /* 連結樣式 */
        .doc-link {
            color: #0284c7;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .doc-link:hover {
            color: #0369a1;
            text-decoration: underline;
        }

        /* 分頁按鈕 */
        .pagination { 
            margin-top: 30px; 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            align-items: center; 
            flex-wrap: wrap; 
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .page-btn { 
            padding: 8px 18px; 
            border: 1px solid var(--border-color); 
            background: var(--card-bg); 
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .page-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: #f9fafb;
        }
        #pageInfo {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .list-container { padding: 25px 20px; }
            h1 { font-size: 1.5rem; }
            .controls { flex-direction: column; align-items: stretch; text-align: center; }
            .controls > div { display: flex; justify-content: center; align-items: center; }
            .notice-item { padding: 20px 15px; }
            .faq-q { font-size: 1.2rem; }
            .faq-a { font-size: 1rem; padding: 12px; }
            .pagination { gap: 8px; }
            .page-btn { padding: 6px 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="expandable-menu-container" id="menuContainer">
    <div class="menu-content" id="menuContent"></div>
    <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
        <span id="serviceIcon">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </span>
        <span id="serviceText">選單</span>
    </button>
</div>
    
<div class="list-container">
    <div class="header-section">
        <a href="../index.html" class="back-home">&#x2190;&#xFE0E; 返回首頁</a>
        <h1>超自然現象彙典</h1>
    </div>

    <div class="controls">
        <div>每頁顯示：&nbsp;
            <select id="pageSize" onchange="changePageSize()">
                <option value="10">10 條</option>
                <option value="20">20 條</option>
                <option value="50">50 條</option>
            </select>
        </div>
        <div id="totalCount">共 0 筆</div>
    </div>
    
    <div id="list-content">載入中...</div>
    
    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
        
        <span>跳至第 
            <select id="pageJump" onchange="jumpToPage()">
            </select> 頁
        </span>
    
        <span id="pageInfo"> / 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
    </div>
</div>
    
<footer>
    <p>&copy; 2026 鬼磕頭. All Rights Reserved.</p>
</footer>
    
<script type="module">
    import * as Global from '/Javascript/global.js';

    let allFAQs = [];
    let currentPage = 1;
    let pageSize = 10;
    let SERVICE_API_URL = "";
    const iniPath = '/settings/global.ini';

    async function init() {
        const cached = localStorage.getItem('cache_services');
        if (cached) {
            processData(JSON.parse(cached));
        }

        try {
            const config = await Global.getIni(iniPath);
            if (config) {
                if (config.MENU_DATA) Global.initMenu(config.MENU_DATA);
                
                if (allFAQs.length === 0 && config.JsonService) {
                    await fetchStaticJson(config.JsonService);
                }

                if (config.SERVICE_API_URL) {
                    SERVICE_API_URL = config.SERVICE_API_URL.startsWith("http") ? config.SERVICE_API_URL : atob(config.SERVICE_API_URL);
                    fetchRemoteData();
                }
            }
        } catch (e) { console.error("初始化失敗", e); }
    }

    async function fetchStaticJson(path) {
        try {
            const res = await fetch(path);
            if (res.ok) {
                const data = await res.json();
                processData(data);
            }
        } catch (e) { console.warn("靜態讀取失敗:", e); }
    }

    async function fetchRemoteData() {
        try {
            const res = await fetch(`${SERVICE_API_URL}${SERVICE_API_URL.includes('?') ? '&' : '?'}type=service`);
            if (!res.ok) return;
            const data = await res.json();
            
            if (JSON.stringify(data) !== localStorage.getItem('cache_services')) {
                localStorage.setItem('cache_services', JSON.stringify(data));
                processData(data);
            }
        } catch (e) { console.error("API 同步失敗:", e); }
    }

    function processData(data) {
        if (!data || !Array.isArray(data)) return;

        allFAQs = data.filter(item => String(item["分類"] || "") === "超自然現象彙典")
                      .sort((a, b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));

        updateUI();
    }

    function updateUI() {
        document.getElementById('totalCount').innerText = `共 ${allFAQs.length} 筆`;
        render();
    }

    function render() {
        const listContent = document.getElementById('list-content');
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pagedData = allFAQs.slice(start, end);
    
        if (allFAQs.length === 0) {
            listContent.innerHTML = '<div style="text-align:center; padding: 30px; color:#6b7280;">目前暫無符合條件的常見問題項目。</div>';
            return;
        }
    
        listContent.innerHTML = pagedData.map((item, index) => {
            const q = item["標題"];
            const a = item["貼文內容"] || item["內容"] || "暫無內容";
            const posturl = item["連結"] || item["貼文連結"] || "";
            const qNumber = start + index + 1; 
            
            let urlArray = [];
            if (Array.isArray(posturl)) {
                urlArray = posturl;
            } else if (typeof posturl === "string" && posturl.trim() !== "") {
                urlArray = posturl.split(/[,\n\s]+/).filter(url => url.trim() !== "");
            }
            
            // 加上了 class="doc-link" 來美化按鈕外觀
            const linksHtml = urlArray.length > 0  
                ? `\n\n參考資料：\n${urlArray.map((url, i) => `<a href="${url}" class="doc-link" target="_blank" rel="noopener noreferrer">文章${i + 1}</a>`).join('\t')}`  
                : "";
    
            return `
                <div class="notice-item">
                    <div class="faq-q">Q${qNumber}: ${q}</div>
                    <div class="faq-a"><span>A: ${a}</span>${linksHtml}</div>
                </div>
            `;
        }).join('');
    
        const maxPage = Math.ceil(allFAQs.length / pageSize) || 1;
        
        document.getElementById('pageInfo').innerText = ` / ${maxPage} 頁`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = end >= allFAQs.length;
    
        const pageJump = document.getElementById('pageJump');
        let options = "";
        for (let i = 1; i <= maxPage; i++) {
            options += `<option value="${i}" ${i === currentPage ? 'selected' : ''}>${i}</option>`;
        }
        pageJump.innerHTML = options;
    }

    window.changePageSize = () => { pageSize = parseInt(document.getElementById('pageSize').value); currentPage = 1; render(); };
    
    window.jumpToPage = () => { currentPage = parseInt(document.getElementById('pageJump').value); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    window.prevPage = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } };
    window.nextPage = () => { if(currentPage * pageSize < allFAQs.length) { currentPage++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } };

    window.addEventListener('DOMContentLoaded', init);
</script>

<script type="module" src="/Javascript/global.js"></script>

</body>
</html>
