<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. 搜尋引擎設定 (解決顯示 GitHub 文件的關鍵) -->
    <title>所有公告記錄 | 鬼磕頭</title>
    <meta name="description" content="查看鬼磕頭日誌的最新公告、服務更新與靈異紀實紀錄。">

    <!-- 2. 網站圖示 (使用您的絕對路徑) -->
    <link rel="icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://spiritref.github.io/GhostKowtow.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://spiritref.github.io/GhostKowtow.jpg">

    <!-- 3. 社群分享設定 (OG Tags) -->
    <meta property="og:title" content="所有公告記錄 | 鬼磕頭">
    <meta property="og:description" content="查看鬼磕頭日誌的最新公告、服務更新與靈異紀實紀錄。">
    <meta property="og:image" content="https://spiritref.github.io/GhostKowtow.jpg">
    <meta property="og:type" content="website">
	<meta property="og:site_name" content="鬼磕頭">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="常見問題 | 鬼磕頭">
    <meta name="twitter:description" content="專業靈學服務與常見疑問解答">
    <meta name="twitter:image" content="https://spiritref.github.io/GhostKowtow.jpg">
	<link rel="stylesheet" href="https://spiritref.github.io/CSS/global.css">
	<style>
		body { font-family: sans-serif; background: #f4f4f4; padding: 20px; color: #333; line-height: 1.6; }
		.list-container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
		h1 { border-bottom: 2px solid #c0392b; padding-bottom: 10px; font-size: 1.5rem; color: #333; }
		
		.controls { 
			display: flex; 
			justify-content: space-between; 
			align-items: center; 
			margin-bottom: 20px; 
			background: #f9f9f9; 
			padding: 10px; 
			border-radius: 5px; 
			font-size: 0.9rem;
			flex-wrap: wrap; 
			gap: 10px;
		}
		
		.item { padding: 15px 0; border-bottom: 1px solid #eee; white-space: pre-line; word-wrap: break-word; }
		.item:last-child { border-bottom: none; }
		.date { color: #c0392b; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
		
		.pagination { margin-top: 20px; display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
		.page-btn { padding: 6px 14px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; }
		.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
		.jump-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; background: #fff; }

		@media (max-width: 600px) {
			body { padding: 10px; }
			.list-container { padding: 15px; }
			h1 { font-size: 1.3rem; }
			.controls { flex-direction: column; align-items: flex-start; }
			.pagination { gap: 5px; }
		}
	</style>
</head>
<body>
	
<div class="expandable-menu-container" id="menuContainer">
	<div class="menu-content" id="menuContent"></div>
	<button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
		<span id="serviceIcon">
	        <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
	            <line x1="3" y1="12" x2="21" y2="12"></line>
	            <line x1="3" y1="6" x2="21" y2="6"></line>
	            <line x1="3" y1="18" x2="21" y2="18"></line>
	        </svg>
	    </span>
		<span id="serviceText">選單</span>
	</button>
</div>
	
<div class="list-container">
	<a href="../index.html" class="back-home">&#x2190;&#xFE0E; 返回首頁</a>
	<h1>所有公告記錄</h1>

	<div class="controls">
		<div>每頁顯示：
			<select id="pageSize" onchange="changePageSize()">
				<option value="10">10 條</option>
				<option value="20">20 條</option>
				<option value="50">50 條</option>
			</select>
		</div>
		<div id="totalCount">共 0 筆</div>
	</div>

	<div id="list-content">載入中...</div>

	<div class="pagination">
		<button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
		
		<span>跳至第 
			<select id="pageJump" class="jump-select" onchange="jumpToPage()">
				<option value="1">1</option>
			</select> 頁
		</span>

		<span id="pageInfo">第 1 頁</span>
		<button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
	</div>
</div>

<script type="module">
	import { getIni } from '../Javascript/API.js';
	import * as Global from 'https://spiritref.github.io/Javascript/global.js';

	let API_BASE = "";
	let JSON_PATH = ""; // 💡 儲存 INI 裡的靜態 JSON 路徑
	let allNotices = [];
	let currentPage = 1;
	let pageSize = 10;
	const iniPath = 'https://spiritref.github.io/settings/global.ini';

	async function init() {
		// 1. 優先讀取快取
		const cache = localStorage.getItem('cache_notices');
		if (cache) {
			allNotices = JSON.parse(cache);
			updateUI();
		}

		try {
			const config = await getIni(iniPath);
			if (config.MENU_DATA) Global.initMenu(config.MENU_DATA);
			if (config) {
				// 💡 讀取 JSON 備份路徑 (例如: ../Data/Notices.json)
				JSON_PATH = config.JsonNotice || config.JsonData; 
				
				// 💡 如果快取沒資料，立刻先抓靜態 JSON
				if (allNotices.length === 0 && JSON_PATH) {
					await fetchStaticJson();
				}

				// 2. 解析 API 網址並啟動背景同步
				if (config.NOVEL_API_URL) {
					API_BASE = config.NOVEL_API_URL.startsWith("http") ? config.NOVEL_API_URL : atob(config.NOVEL_API_URL);
					fetchRemoteData(cache); 
				}
			}
		} catch (e) {
			console.error("初始化失敗", e);
		}
	}

	/**
	 * 💡 核心邏輯：抓取靜態 JSON 備份
	 */
	async function fetchStaticJson() {
		try {
			// 處理多一層 ghoststory 的路徑問題
			let finalPath = JSON_PATH;
			if (window.location.pathname.includes('/article/') || window.location.pathname.includes('/ghoststory/')) {
				finalPath = JSON_PATH.startsWith('../') ? JSON_PATH : '../' + JSON_PATH;
			}

			const res = await fetch(finalPath);
			if (res.ok) {
				const data = await res.json();
				// 過濾與排序
				const filtered = data.filter(i => String(i["標題"] || "").includes("公告"))
									 .sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));
				
				allNotices = filtered;
				console.log("📄 已載入靜態 JSON 公告備份");
				updateUI();
			}
		} catch (e) {
			console.warn("無法讀取靜態 JSON:", e);
		}
	}

	async function fetchRemoteData(cache) {
		try {
			const res = await fetch(`${API_BASE}${API_BASE.includes('?') ? '&' : '?'}type=notice`);
			const data = await res.json();
			const filtered = data.filter(i => String(i["標題"]).includes("公告"))
								 .sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));

			if (JSON.stringify(filtered) !== cache) {
				allNotices = filtered;
				updateUI();
				setTimeout(() => {
					localStorage.setItem('cache_notices', JSON.stringify(filtered));
				}, 100);
			}
		} catch(e) { console.error("API 同步失敗", e); }
	}

	function updateUI() {
		document.getElementById('totalCount').innerText = `共 ${allNotices.length} 筆`;
		updateJumpSelect();
		render();
	}

	function updateJumpSelect() {
		const select = document.getElementById('pageJump');
		const maxPage = Math.ceil(allNotices.length / pageSize) || 1;
		let options = "";
		for (let i = 1; i <= maxPage; i++) {
			options += `<option value="${i}" ${i === currentPage ? 'selected' : ''}>${i}</option>`;
		}
		select.innerHTML = options;
	}

	function render() {
		if (allNotices.length === 0) return;
		const start = (currentPage - 1) * pageSize;
		const end = start + pageSize;
		const pagedData = allNotices.slice(start, end);

		document.getElementById('list-content').innerHTML = pagedData.map(i => {
			const dateStr = i["發佈日期"] ? new Date(i["發佈日期"]).toLocaleDateString() : "近期";
			return `
				<div class="item">
					<div class="date">[${dateStr}]</div>
					<div class="content">${i["貼文內容"] || i["內容"]}</div>
				</div>
			`;
		}).join('');

		const maxPage = Math.ceil(allNotices.length / pageSize) || 1;
		document.getElementById('pageInfo').innerText = ` / ${maxPage} 頁`;
		document.getElementById('prevBtn').disabled = currentPage === 1;
		document.getElementById('nextBtn').disabled = end >= allNotices.length;
		
		document.getElementById('pageJump').value = currentPage;
	}

	window.changePageSize = () => {
		pageSize = parseInt(document.getElementById('pageSize').value);
		currentPage = 1;
		updateJumpSelect();
		render();
	};

	window.jumpToPage = () => {
		const select = document.getElementById('pageJump');
		currentPage = parseInt(select.value);
		render();
		window.scrollTo(0, 0);
	};

	window.prevPage = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); } };
	window.nextPage = () => { if(currentPage * pageSize < allNotices.length) { currentPage++; render(); window.scrollTo(0,0); } };

	window.addEventListener('DOMContentLoaded', init);
</script>
<script type="module" src="https://spiritref.github.io/Javascript/global.js"></script>
</body>
</html>
